<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sofia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--creme:#FDF8F2;--doux:#F5EDE0;--chaud:#E8C49A;--rose:#C97B63;--rouge:#A85545;--brun:#5C3825;--vert:#5A8A6A;--texte:#3A2A1A;--ombre:rgba(92,56,37,0.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--creme);font-family:'Nunito',sans-serif;color:var(--texte);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:white;border-bottom:2px solid var(--doux);padding:14px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px var(--ombre)}
.header-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--chaud),var(--rose));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.header-avatar.speaking{animation:sofiaGlow .9s ease-in-out infinite alternate}
.header-avatar.listening{animation:listenGlow .9s ease-in-out infinite alternate}
@keyframes sofiaGlow{from{box-shadow:0 3px 10px rgba(201,123,99,.35)}to{box-shadow:0 3px 22px rgba(90,138,106,.6),0 0 0 4px rgba(168,200,176,.3)}}
@keyframes listenGlow{from{box-shadow:0 3px 10px rgba(74,122,155,.35)}to{box-shadow:0 3px 22px rgba(74,122,155,.6),0 0 0 4px rgba(168,200,216,.3)}}
.header-info{flex:1}
.header-name{font-family:'Playfair Display',serif;font-size:24px;color:var(--brun)}
.header-status{font-size:14px;color:var(--vert);font-weight:700;margin-top:2px;display:flex;align-items:center;gap:5px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--vert);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.messages-zone{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.message{display:flex;align-items:flex-end;gap:8px;animation:msgIn .3s ease;max-width:88%}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.sofia{align-self:flex-start}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.message.sofia .msg-av{background:linear-gradient(135deg,var(--chaud),var(--rose))}
.message.user .msg-av{background:linear-gradient(135deg,#7BAEC8,#4A7A9B)}
.msg-bubble{padding:14px 18px;border-radius:20px;font-size:18px;line-height:1.7}
.message.sofia .msg-bubble{background:white;color:var(--texte);border-bottom-left-radius:5px;box-shadow:0 2px 10px var(--ombre);border-left:4px solid var(--chaud)}
.message.user .msg-bubble{background:linear-gradient(135deg,var(--rose),var(--rouge));color:white;border-bottom-right-radius:5px}
.typing-indicator{display:flex;align-items:flex-end;gap:8px;align-self:flex-start}
.typing-bubble{background:white;border-radius:20px;border-bottom-left-radius:5px;padding:16px 20px;box-shadow:0 2px 10px var(--ombre);border-left:4px solid var(--chaud);display:flex;gap:6px;align-items:center}
.t-dot{width:10px;height:10px;border-radius:50%;background:var(--rose);animation:tdot 1.3s ease-in-out infinite}
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.input-zone{background:white;border-top:2px solid var(--doux);padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:0 -2px 12px var(--ombre)}
.mic-grande-zone{display:flex;justify-content:center;padding:8px 0 4px}
.mic-grand-btn{width:100%;max-width:340px;height:80px;border-radius:40px;background:linear-gradient(135deg,var(--vert),#3A6A4A);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:14px;box-shadow:0 6px 24px rgba(90,138,106,.45);transition:all .2s ease}
.mic-grand-btn:hover{transform:scale(1.03)}
.mic-grand-btn:active{transform:scale(.97)}
.mic-grand-btn.listening{background:linear-gradient(135deg,#E06060,#C04040);animation:listenPulse 1s ease-in-out infinite}
@keyframes listenPulse{0%,100%{box-shadow:0 6px 24px rgba(224,96,96,.45)}50%{box-shadow:0 6px 40px rgba(224,96,96,.7),0 0 0 12px rgba(224,96,96,.15)}}
.mic-grand-icone{font-size:40px;line-height:1}
.mic-grand-texte{color:white;font-size:20px;font-weight:800}
.suggestions{display:flex;gap:8px;overflow-x:auto}
.sug-btn{white-space:nowrap;background:var(--doux);border:2px solid var(--chaud);border-radius:24px;padding:10px 16px;font-size:15px;color:var(--brun);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s;flex-shrink:0}
.sug-btn:hover{background:var(--chaud);color:white}
.input-row{display:flex;gap:10px;align-items:flex-end}
.text-input{flex:1;background:var(--doux);border:2px solid transparent;border-radius:24px;padding:14px 20px;font-size:17px;font-family:'Nunito',sans-serif;color:var(--texte);resize:none;outline:none;max-height:100px;line-height:1.4}
.text-input:focus{border-color:var(--chaud);background:white}
.text-input::placeholder{color:#BBB}
.send-btn{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rouge));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 3px 12px rgba(168,85,69,.4);transition:all .2s}
.send-btn:hover{transform:scale(1.08)}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.welcome-msg .msg-bubble{border-left:4px solid var(--vert)!important}
</style>
</head>
<body>
<div class="header">
<div class="header-avatar" id="sofiaAvatar">🌸</div>
<div class="header-info">
<div class="header-name">Sofia</div>
<div class="header-status"><div class="status-dot"></div><span id="sofiaStatus">Disponible pour vous</span></div>
</div>
</div>
<div class="messages-zone" id="messagesZone">
<div class="message sofia welcome-msg">
<div class="msg-av">🌸</div>
<div class="msg-bubble">Bonjour ! Je suis tellement contente de vous parler ! 😊<br><br>Appuyez sur le grand bouton vert pour me parler — ou écrivez-moi en bas ! 🌷</div>
</div>
</div>
<div class="input-zone">
<div class="mic-grande-zone">
<button class="mic-grand-btn" id="micGrandBtn" onclick="toggleVoice()">
<span class="mic-grand-icone" id="micIcone">🎙️</span>
<span class="mic-grand-texte" id="micTexte">Appuyez pour parler</span>
</button>
</div>
<div class="suggestions">
<button class="sug-btn" onclick="sendSuggestion('Bonjour Sofia, comment vas-tu ?')">👋 Bonjour</button>
<button class="sug-btn" onclick="sendSuggestion('Quelle est la météo ?')">🌤️ Météo</button>
<button class="sug-btn" onclick="sendSuggestion('Raconte-moi une blague !')">😄 Blague</button>
<button class="sug-btn" onclick="sendSuggestion('Quelles activités me conseilles-tu ?')">🎭 Activités</button>
<button class="sug-btn" onclick="sendSuggestion('Dis-moi quelque chose de beau.')">☀️ Belle pensée</button>
</div>
<div class="input-row">
<textarea class="text-input" id="userInput" placeholder="Ou écrivez à Sofia ici..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
<button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>
</div>
<script>
let conversationHistory=[];
let isSpeaking=false;
let isListening=false;
let recognition=null;
function speakText(t){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();let c=t.replace(/<br\s*\/?>/gi,'. ').replace(/[\u{1F300}-\u{1FFFF}]/gu,'').replace(/\s+/g,' ').trim();let u=new SpeechSynthesisUtterance(c);u.lang='fr-CA';u.rate=0.78;u.pitch=1.15;u.volume=1;let go=()=>{let v=speechSynthesis.getVoices();let f=v.find(x=>x.lang==='fr-CA')||v.find(x=>x.lang==='fr-FR')||v.find(x=>x.lang.startsWith('fr'));if(f)u.voice=f;isSpeaking=true;document.getElementById('sofiaAvatar').classList.add('speaking');setStatus('Sofia vous parle... 🗣️');u.onend=u.onerror=()=>{isSpeaking=false;document.getElementById('sofiaAvatar').classList.remove('speaking');setStatus('Disponible pour vous')};speechSynthesis.speak(u)};if(speechSynthesis.getVoices().length>0)go();else speechSynthesis.onvoiceschanged=go}
function initVoice(){let S=window.SpeechRecognition||window.webkitSpeechRecognition;if(!S){document.getElementById('micTexte').textContent='Écrire seulement';document.getElementById('micGrandBtn').style.opacity='0.5';return}recognition=new S();recognition.lang='fr-CA';recognition.continuous=false;recognition.interimResults=false;recognition.onresult=(e)=>{let t=e.results[0][0].transcript;stopListening();addMessage(t,'user');conversationHistory.push({role:'user',content:t});getSofiaReply()};recognition.onerror=recognition.onend=()=>stopListening()}
function toggleVoice(){if(isSpeaking){speechSynthesis.cancel();isSpeaking=false;document.getElementById('sofiaAvatar').classList.remove('speaking')}if(isListening)stopListening();else startListening()}
function startListening(){if(!recognition)return;isListening=true;document.getElementById('micGrandBtn').classList.add('listening');document.getElementById('micIcone').textContent='⏹️';document.getElementById('micTexte').textContent='Sofia vous écoute...';document.getElementById('sofiaAvatar').classList.add('listening');setStatus('Je vous écoute... 👂');try{recognition.start()}catch(e){}}
function stopListening(){isListening=false;document.getElementById('micGrandBtn').classList.remove('listening');document.getElementById('micIcone').textContent='🎙️';document.getElementById('micTexte').textContent='Appuyez pour parler';document.getElementById('sofiaAvatar').classList.remove('listening');setStatus('Disponible pour vous');try{recognition.stop()}catch(e){}}
function setStatus(t){document.getElementById('sofiaStatus').textContent=t}
function autoResize(e){e.style.height='auto';e.style.height=Math.min(e.scrollHeight,100)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function sendSuggestion(t){document.getElementById('userInput').value=t;sendMessage()}
function addMessage(t,w){let z=document.getElementById('messagesZone');let d=document.createElement('div');d.className='message '+w;let a=document.createElement('div');a.className='msg-av';a.textContent=w==='sofia'?'🌸':'👤';let b=document.createElement('div');b.className='msg-bubble';b.innerHTML=t.replace(/\n/g,'<br>');d.appendChild(a);d.appendChild(b);z.appendChild(d);z.scrollTop=z.scrollHeight}
function showTyping(){let z=document.getElementById('messagesZone');let d=document.createElement('div');d.className='typing-indicator';d.id='typingDots';let a=document.createElement('div');a.className='msg-av';a.style.cssText='background:linear-gradient(135deg,#E8C49A,#C97B63);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;';a.textContent='🌸';let b=document.createElement('div');b.className='typing-bubble';b.innerHTML='<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';d.appendChild(a);d.appendChild(b);z.appendChild(d);z.scrollTop=z.scrollHeight}
function hideTyping(){let t=document.getElementById('typingDots');if(t)t.remove()}
function sendMessage(){let i=document.getElementById('userInput');let t=i.value.trim();if(!t)return;addMessage(t,'user');i.value='';i.style.height='auto';conversationHistory.push({role:'user',content:t});getSofiaReply()}
async function getSofiaReply(){document.getElementById('sendBtn').disabled=true;setStatus('Sofia réfléchit... 💭');showTyping();try{let r=await fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversationHistory})});let d=await r.json();hideTyping();if(d.content&&d.content[0]){let reply=d.content[0].text;conversationHistory.push({role:'assistant',content:reply});addMessage(reply,'sofia');speakText(reply)}else{addMessage("Oh, j'ai eu un petit souci ! Pouvez-vous répéter ? 😊",'sofia')}}catch(e){hideTyping();addMessage("Je suis désolée, je n'arrive pas à vous répondre. Réessayons ! 🌸",'sofia')}document.getElementById('sendBtn').disabled=false;setStatus('Disponible pour vous')}
initVoice();
</script>
</body>
</html>
